<script>
const WORKER_URL = "https://pysiga.d-alexjose.workers.dev";
const email = new URLSearchParams(window.location.search).get('email');

let datosGlobales = null;
let chartEvolucion = null, chartDistribucion = null, chartPorLote = null;

// Helper para acceder a arrays anidados de forma segura
function getSafeArray(obj, path) {
  try {
    const parts = path.split('.');
    let current = obj;
    for (const part of parts) {
      if (current === null || current === undefined) return [];
      current = current[part];
    }
    return Array.isArray(current) ? current : [];
  } catch {
    return [];
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (!email) {
    alert('❌ No se encontró el correo del usuario.');
    window.close();
    return;
  }
  cargarDatos();
});

async function cargarDatos() {
  mostrarLoader(true);
  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        accion: 'reportePesajeCorporal',
        email: email,
        token: 'pysiga-node'
      })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

    const data = await response.json();
    console.log('📦 Respuesta:', { ok: data?.ok, animales: data?.listados?.animalesConDatos?.length });

    if (!data || data.ok !== true) throw new Error(data?.error || 'Respuesta inválida');

    datosGlobales = data;
    const animalesBase = getSafeArray(datosGlobales, 'listados.animalesConDatos');

    poblarFiltros(animalesBase);
    aplicarFiltros();

    mostrarLoader(false);
    document.getElementById('contenido').style.display = 'block';
  } catch (error) {
    console.error('❌ Error:', error);
    alert('❌ Error: ' + error.message);
    mostrarLoader(false);
  }
}

function aplicarFiltros() {
  if (!datosGlobales) return;

  const loteFiltro = document.getElementById('filtroLote')?.value || '';
  const clasifFiltro = document.getElementById('filtroClasif')?.value || '';
  const metaGanancia = parseFloat(document.getElementById('metaGanancia')?.value) || 0;

  const animalesBase = getSafeArray(datosGlobales, 'listados.animalesConDatos');
  const desmejoradosBase = getSafeArray(datosGlobales, 'listados.animalesDesmejorados');

  let animalesFiltrados = animalesBase.filter(a => {
    if (loteFiltro && a?.lote !== loteFiltro) return false;
    if (clasifFiltro && a?.clasificacion !== clasifFiltro) return false;
    return true;
  });

  let desmejoradosFiltrados = desmejoradosBase.filter(a => {
    if (loteFiltro && a?.lote !== loteFiltro) return false;
    if (clasifFiltro && a?.clasificacion !== clasifFiltro) return false;
    return true;
  });

  const animalesConGanancia = animalesFiltrados.filter(a => a?.gananciaDiaria !== null && a?.gananciaDiaria !== undefined);
  const gananciaDiariaPromedio = animalesConGanancia.length > 0
    ? animalesConGanancia.reduce((sum, a) => sum + a.gananciaDiaria, 0) / animalesConGanancia.length
    : 0;

  const kilosTotales = animalesFiltrados.reduce((sum, a) => sum + (a?.pesoActual || 0), 0);
  const animalesConMeta = metaGanancia > 0 ? animalesConGanancia.filter(a => a.gananciaDiaria >= metaGanancia) : [];
  const metaCumplidaPorcentaje = animalesConGanancia.length > 0
    ? (animalesConMeta.length / animalesConGanancia.length) * 100
    : 0;

  const setKPI = (id, valor) => { const el = document.getElementById(id); if (el) el.textContent = valor; };

  setKPI('kpiGananciaGeneral', gananciaDiariaPromedio.toFixed(2));
  setKPI('kpiKilosTotales', Math.round(kilosTotales).toLocaleString('es-VE'));
  setKPI('kpiTotalAnimales', animalesFiltrados.length);
  setKPI('kpiDesmejorados', desmejoradosFiltrados.length);
  setKPI('kpiMetaCumplida', animalesConMeta.length);
  setKPI('kpiMetaPorcentaje', `${metaCumplidaPorcentaje.toFixed(1)}%${metaGanancia > 0 ? ` (meta: ${metaGanancia})` : ''}`);

  // KPIs por lote
  const kpisPorLote = {};
  const lotes = [...new Set(animalesFiltrados.map(a => a?.lote).filter(l => l))];
  lotes.forEach(lote => {
    const animalesLote = animalesFiltrados.filter(a => a?.lote === lote);
    const conGanancia = animalesLote.filter(a => a?.gananciaDiaria !== null);
    kpisPorLote[lote] = {
      totalAnimales: animalesLote.length,
      kilosTotales: animalesLote.reduce((sum, a) => sum + (a?.pesoActual || 0), 0),
      gananciaDiariaPromedio: conGanancia.length > 0 ? conGanancia.reduce((s, a) => s + a.gananciaDiaria, 0) / conGanancia.length : null
    };
  });

  // KPIs por clasificación
  const kpisPorClasif = {};
  const clasifs = [...new Set(animalesFiltrados.map(a => a?.clasificacion).filter(c => c && String(c).trim() !== ""))];
  clasifs.forEach(clasif => {
    const animalesClasif = animalesFiltrados.filter(a => a?.clasificacion === clasif);
    const conGanancia = animalesClasif.filter(a => a?.gananciaDiaria !== null);
    kpisPorClasif[clasif] = {
      totalAnimales: animalesClasif.length,
      kilosTotales: animalesClasif.reduce((sum, a) => sum + (a?.pesoActual || 0), 0),
      gananciaDiariaPromedio: conGanancia.length > 0 ? conGanancia.reduce((s, a) => s + a.gananciaDiaria, 0) / conGanancia.length : null
    };
  });

  // Gráficos
  const graficosBackend = datosGlobales?.graficos || {};
  const evolucionBackend = Array.isArray(graficosBackend.evolucionGananciaGeneral) ? graficosBackend.evolucionGananciaGeneral : [];
  const distribucionBackend = graficosBackend.distribucionGananciaDiaria || calcularDistribucionLocal(animalesConGanancia);

  renderizarGraficos(evolucionBackend, distribucionBackend, kpisPorLote, graficosBackend.evolucionPorLote || {});
  renderizarTablas(kpisPorLote, kpisPorClasif, desmejoradosFiltrados, animalesFiltrados, metaGanancia);
}

function calcularDistribucionLocal(animales) {
  const rangos = { "Negativa": 0, "0 a 0.5": 0, "0.5 a 1": 0, "1 a 1.5": 0, "1.5 a 2": 0, "Más de 2": 0 };
  animales.forEach(a => {
    const gd = a?.gananciaDiaria;
    if (gd === null || gd === undefined) return;
    if (gd < 0) rangos["Negativa"]++;
    else if (gd < 0.5) rangos["0 a 0.5"]++;
    else if (gd < 1) rangos["0.5 a 1"]++;
    else if (gd < 1.5) rangos["1 a 1.5"]++;
    else if (gd < 2) rangos["1.5 a 2"]++;
    else rangos["Más de 2"]++;
  });
  return rangos;
}

function renderizarGraficos(datosEvolucion, distribucion, kpisPorLote, evolucionPorLoteBackend) {
  // GRÁFICO DE EVOLUCIÓN
  const ctxEvol = document.getElementById('chartEvolucion')?.getContext('2d');
  if (ctxEvol) {
    if (chartEvolucion) chartEvolucion.destroy();
    chartEvolucion = new Chart(ctxEvol, {
      type: 'line',
      data: {
        labels: datosEvolucion.map(d => d?.fecha || ''),
        datasets: [{
          label: 'Ganancia Diaria Promedio (kg/día)',
          data: datosEvolucion.map(d => d?.gananciaDiariaPromedio ?? 0),
          borderColor: '#e74c3c',
          backgroundColor: 'rgba(231, 76, 60, 0.2)',
          borderWidth: 3,
          fill: true,
          tension: 0.3,
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, position: 'top' } },
        scales: {
          y: { beginAtZero: false, grid: { color: '#e0e0e0' } },
          x: { grid: { color: '#e0e0e0' } }
        }
      }
    });
  }

  // GRÁFICO DE DISTRIBUCIÓN
  const ctxDist = document.getElementById('chartDistribucion')?.getContext('2d');
  if (ctxDist) {
    if (chartDistribucion) chartDistribucion.destroy();
    chartDistribucion = new Chart(ctxDist, {
      type: 'doughnut',
      data: {
        labels: Object.keys(distribucion),
        datasets: [{
          data: Object.values(distribucion),
          backgroundColor: ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#9b59b6'],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'right' } }
      }
    });
  }

  // GRÁFICO POR LOTE
  const ctxLote = document.getElementById('chartPorLote')?.getContext('2d');
  if (ctxLote) {
    if (chartPorLote) chartPorLote.destroy();

    if (evolucionPorLoteBackend && Object.keys(evolucionPorLoteBackend).length > 0) {
      const lotes = Object.keys(evolucionPorLoteBackend);
      const fechas = [...new Set(lotes.flatMap(l => {
        const arr = evolucionPorLoteBackend[l];
        return Array.isArray(arr) ? arr.map(d => d?.fecha).filter(f => f) : [];
      }))].sort();

      const datasetsLote = lotes.map((lote, i) => ({
        label: lote,
        data: fechas.map(f => {
          const arr = evolucionPorLoteBackend[lote];
          if (!Array.isArray(arr)) return null;
          const dato = arr.find(d => d?.fecha === f);
          return dato?.gananciaDiariaPromedio ?? null;
        }),
        borderColor: ['#2c4f7c', '#e67e22', '#9b59b6', '#e74c3c', '#1abc9c', '#f39c12'][i % 6],
        backgroundColor: 'transparent',
        borderWidth: 2,
        fill: false,
        tension: 0.2
      }));

      chartPorLote = new Chart(ctxLote, {
        type: 'line',
        data: { labels: fechas, datasets: datasetsLote },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: { y: { beginAtZero: true, grid: { color: '#e0e0e0' } }, x: { grid: { color: '#e0e0e0' } } }
        }
      });
    } else {
      const datasetsLote = Object.entries(kpisPorLote).map(([lote, kpi], i) => ({
        label: lote,
        data: [kpi?.gananciaDiariaPromedio !== null ? kpi.gananciaDiariaPromedio : 0],
        backgroundColor: ['#2c4f7c', '#e67e22', '#9b59b6', '#e74c3c', '#1abc9c', '#f39c12'][i % 6],
        borderColor: '#fff',
        borderWidth: 2
      }));

      if (datasetsLote.length > 0) {
        chartPorLote = new Chart(ctxLote, {
          type: 'bar',
          data: { labels: ['Ganancia Diaria (kg/día)'], datasets: datasetsLote },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: { y: { beginAtZero: true, grid: { color: '#e0e0e0' } }, x: { grid: { display: false } } }
          }
        });
      }
    }
  }
}

// Aquí se mantienen las funciones renderizarTablas, poblarFiltros, cambiarTab, mostrarLoader, recargarDatos, imprimir, cerrar
// Son idénticas a tu versión original y no generan errores de sintaxis

</script>
